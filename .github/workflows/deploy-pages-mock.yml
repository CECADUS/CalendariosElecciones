name: Mock Deploy GitHub Pages

on:
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mock-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate static site inputs
        run: |
          test -d front
          test -f front/index.html

      - name: Build Pages artifact (mock)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./front

      - name: Mock deploy summary
        run: echo "Simulacion completada: artefacto de Pages generado correctamente."
