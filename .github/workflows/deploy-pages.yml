name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Madrid
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate frontend scripts and run all frontend tests
        run: |
          node --experimental-default-type=module --check front/app.js
          node --experimental-default-type=module --check front/calculator.js
          node --experimental-default-type=module --check front/pdf-generator.js
          mapfile -t test_files < <(find tests -type f -name "*.test.mjs" | sort)
          if [ "${#test_files[@]}" -eq 0 ]; then
            echo "No se han encontrado tests de frontend en tests/"
            exit 1
          fi
          for test_file in "${test_files[@]}"; do
            echo "Ejecutando $test_file"
            node --experimental-default-type=module "$test_file"
          done

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./front

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
